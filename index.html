<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Nhật ký lãng quên</title>
    <link rel="icon" type="image/x-icon" href="photos/Logo.ico">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Shalimar&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    </head>
<body>
    <button onclick="toggleUploadForm()" style="background-color: transparent; color: white; padding: 20px; margin: 10px; border: 2px solid white; text-align: center; font-size: 24px; font-family: 'Shalimar', cursive; cursor: pointer;">Upload Bài Hát</button>
    <div id="upload-form" style="display:none; background-color: transparent; color: white; padding: 20px; margin: 10px; border: 2px solid white; text-align: center; font-size: 24px; font-family: 'Shalimar', cursive;">
      <select id="album-select" style="margin: 10px;">
        <option value="">Chọn Album</option>
      </select>
      <input type="text" id="new-album-name" placeholder="Tên Album Mới" style="margin: 10px;">
      <button onclick="createAlbum()" style="margin: 10px;">Tạo Album</button>
      <input type="file" id="file-input" accept="audio/*" style="color: white;">
      <button onclick="uploadFile()" style="margin: 10px;">Upload</button>
    </div>
    <div id="album-list" style="background: transparent; color: white; padding: 10px; margin: 10px; border: 2px solid white;">
      <h3 style="font-family: 'Shalimar', cursive; font-size: 24px;">Danh Sách Album</h3>
      <div id="album-items"></div>
    </div>
    <div id="audio-list" style="display:none; background: transparent; color: white; padding: 10px; margin: 10px; border: 2px solid white;">
      <h3 style="font-family: 'Shalimar', cursive; font-size: 24px;">Bài Hát</h3>
      <div id="audio-items"></div>
      <div id="controls" style="display:none; margin-top: 10px; color: white;">
        <button id="prev-btn" style="margin: 5px;">Previous</button>
        <button id="play-pause-btn" style="margin: 5px;">Play</button>
        <button id="next-btn" style="margin: 5px;">Next</button>
        <br>
        <input type="range" id="seek-bar" min="0" max="100" value="0" style="width: 200px; margin: 5px;">
        <span id="current-time">0:00</span> / <span id="duration">0:00</span>
      </div>
    </div>
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
        <img id="play-btn" src="photos/Logo.png" onclick="playAudio()" style="width: 500px; height: 500px; cursor: pointer; margin: 10px;" alt="Play">
    </div>
    <div id="song-name">黄昏-周传雄</div>
    <audio id="audio" autoplay loop>
        <source src="music/HoangHon.mp3" type="audio/mpeg">
        Trình duyệt của bạn không hỗ trợ phát âm thanh.
    </audio>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase.js"></script>
    <script src="script.js?v=1"></script>
    <div id="overlay" class="overlay">
        <div class="spinner"></div>
    </div>
    <div id="notification" style="display:none;"></div>
    </body>
</html>
