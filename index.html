<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Oblivion Diary</title>
    <link rel="icon" type="image/x-icon" href="logo.ico">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Shalimar&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    </head>
<body>
    <div id="background1"></div>
    <div id="background2"></div>
    <video id="background-video" src="https://res.cloudinary.com/dglxrlydv/video/upload/v1772435335/Background_qelwz8.mp4" muted loop autoplay style="display:block;"></video>
    <video id="rain-video" src="https://res.cloudinary.com/dglxrlydv/video/upload/v1772432497/Rain_hvfhh8.mp4" muted loop style="display:none;"></video>
    <div id="upload-modal" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;" onclick="toggleUploadForm()">
      <div id="upload-form" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, #f5f7fa, #c3cfe2); color: #333; padding: 30px; border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; font-size: 18px; font-family: 'Arial', sans-serif;" onclick="event.stopPropagation()">
        <button style="position: absolute; top: 10px; right: 10px; background: #ff6b6b; border: none; color: white; font-size: 18px; cursor: pointer; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;" onclick="toggleUploadForm()">&times;</button>
        <h2 style="margin: 0 0 20px 0; color: #333;">Add track - Create album</h2>
        <select id="album-select" style="margin: 10px; color: #333; border: 1px solid #ccc; border-radius: 5px; padding: 10px; width: 100%; max-width: 300px;">
          <option value="">Select album</option>
        </select>
        <div style="display: flex; align-items: center; margin: 10px;">
          <input type="text" id="new-album-name" placeholder="New album name" style="flex: 1; margin-right: 10px; color: #333; border: 1px solid #ccc; border-radius: 5px; padding: 10px;">
          <button onclick="createAlbum()" style="color: white; background: #28a745; border: none; border-radius: 5px; padding: 10px 20px; cursor: pointer;">Create album</button>
        </div>
        <input type="file" id="file-input" accept="audio/*" style="margin: 10px; color: #333; border: 1px solid #ccc; border-radius: 5px; padding: 10px; width: 100%; max-width: 300px;">
        <button onclick="uploadFile()" style="margin: 10px; color: white; background: #007bff; border: none; border-radius: 5px; padding: 10px 20px; cursor: pointer;">Upload</button>
      </div>
    </div>
    <div id="manage-modal" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;" onclick="toggleManageModal()">
      <div id="manage-form" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, #f5f7fa, #c3cfe2); color: #333; padding: 30px; border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; font-size: 18px; font-family: 'Arial', sans-serif;" onclick="event.stopPropagation()">
        <button style="position: absolute; top: 10px; right: 10px; background: #ff6b6b; border: none; color: white; font-size: 18px; cursor: pointer; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;" onclick="toggleManageModal()">&times;</button>
        <h2 style="margin: 0 0 20px 0; color: #333;">Track management</h2>
        <select id="song-select" style="margin: 10px; color: #333; border: 1px solid #ccc; border-radius: 5px; padding: 10px; width: 100%; max-width: 300px;">
          <option value="">Select a track</option>
        </select>
        <input type="text" id="new-song-name" placeholder="New track name" style="margin: 10px; color: #333; border: 1px solid #ccc; border-radius: 5px; padding: 10px; width: 100%; max-width: 300px;">
        <select id="album-move-select" style="margin: 10px; color: #333; border: 1px solid #ccc; border-radius: 5px; padding: 10px; width: 100%; max-width: 300px;">
          <option value="">Select an album to move to (optional)</option>
        </select>
        <input type="file" id="song-background-file-input" accept="video/*" style="margin: 10px; color: #333; border: 1px solid #ccc; border-radius: 5px; padding: 10px; width: 100%; max-width: 300px;">
        <button onclick="deleteSongBackground()" style="margin: 10px; color: white; background: #dc3545; border: none; border-radius: 5px; padding: 10px 20px; cursor: pointer;">Delete Background Video</button>
        <button onclick="saveSongChanges()" style="margin: 10px; color: white; background: #28a745; border: none; border-radius: 5px; padding: 10px 20px; cursor: pointer;">Save changes</button>
        <button onclick="deleteSong()" style="margin: 10px; color: white; background: #dc3545; border: none; border-radius: 5px; padding: 10px 20px; cursor: pointer;">Delete track</button>
      </div>
    </div>
    <div id="background-modal" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;" onclick="toggleBackgroundModal()">
      <div id="background-form" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, #f5f7fa, #c3cfe2); color: #333; padding: 30px; border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; font-size: 18px; font-family: 'Arial', sans-serif;" onclick="event.stopPropagation()">
        <button style="position: absolute; top: 10px; right: 10px; background: #ff6b6b; border: none; color: white; font-size: 18px; cursor: pointer; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;" onclick="toggleBackgroundModal()">&times;</button>
        <h2 style="margin: 0 0 20px 0; color: #333;">Background settings</h2>
        <select id="background-album-select" style="margin: 10px; color: #333; border: 1px solid #ccc; border-radius: 5px; padding: 10px; width: 100%; max-width: 300px;">
          <option value="">Select album</option>
        </select>
        <input type="file" id="background-file-input" accept="video/*" style="margin: 10px; color: #333; border: 1px solid #ccc; border-radius: 5px; padding: 10px; width: 100%; max-width: 300px;">
        <button onclick="saveBackground()" style="margin: 10px; color: white; background: #28a745; border: none; border-radius: 5px; padding: 10px 20px; cursor: pointer;">Save background</button>
      </div>
    </div>
    <button onclick="toggleFunctionMenu()" style="position: absolute; top: 70px; right: 10px; background: transparent; border: none; font-size: 24px; cursor: pointer;">☰</button>
    <button id="rain-button" onclick="playRainLoop()" style="position: absolute; top: 110px; right: 10px; background: transparent; border: none; font-size: 24px; cursor: pointer; font-family: 'Shalimar', cursive;">⛈Raindrops</button>
    <div id="function-menu" style="display: none; position: absolute; top: 110px; right: 10px; background: rgba(0,0,0,0.8); color: white; border: 2px solid white; border-radius: 5px; padding: 10px; z-index: 1000;">
      <p onclick="toggleUploadForm()" style="margin: 0; cursor: pointer; font-family: 'Shalimar', cursive; font-size: 24px;">● Add track/Create album</p>
      <p onclick="toggleManageModal()" style="margin: 5px 0 0 0; cursor: pointer; font-family: 'Shalimar', cursive; font-size: 24px;">● Track management</p>
      <p onclick="toggleBackgroundModal()" style="margin: 5px 0 0 0; cursor: pointer; font-family: 'Shalimar', cursive; font-size: 24px;">● Background settings</p>
    </div>
    <div id="album-list" style="background: transparent; color: white; padding: 10px; margin: 80px 10px 10px 10px; border: 2px solid white;">
      <h3 onclick="toggleAlbums()" style="font-family: 'Shalimar', cursive; font-size: 24px; cursor: pointer;">Albums</h3>
      <div id="album-items" style="display: none;"></div>
    </div>
    <div id="audio-list" style="display:none; background: transparent; color: white; padding: 10px; margin: 10px; border: 2px solid white; overflow-y: auto; max-height: 350px;">
      <h3 style="font-family: 'Shalimar', cursive; font-size: 24px;">Tracks</h3>
      <div id="audio-items"></div>
    </div>
    <div id="controls" style="display:none; margin-top: 10px; color: white;">
      <button id="prev-btn" style="margin: 5px;">◁◁</button>
      <button id="play-pause-btn" style="margin: 5px;">▶</button>
      <button id="next-btn" style="margin: 5px;">▷▷</button>
      <button id="repeat-btn" style="margin: 5px; font-family: 'Shalimar', cursive; font-size: 30px;">Repeat this track</button>
      <br>
      <input type="range" id="seek-bar" min="0" max="100" value="0" style="width: 200px; margin: 5px;">
      <span id="current-time">0:00</span> / <span id="duration">0:00</span>
    </div>
    <div id="song-name">黄昏-周传雄</div>
    <audio id="audio">
        <source src="sound/黄昏.mp3" type="audio/mpeg">
        Your browser does not support audio playback.
    </audio>
    <audio id="rain-audio" style="display:none;" loop></audio>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase.js"></script>
    <script src="script.js?v=1"></script>
    <div id="overlay" class="overlay">
        <div class="spinner"></div>
    </div>
    <div id="notification" style="display:none;"></div>
    </body>
</html>
